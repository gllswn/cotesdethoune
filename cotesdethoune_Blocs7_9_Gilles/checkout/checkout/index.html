941">© Copyright 2023 | Grint, Marti & Co.</p></div></div></div></div><!-- footer END --></section></div><!-- Main container END -->  <!-- Additional JS --><script src="../../js/all.js?8235"></script><!-- Additional JS END --><!-- ============================================================   Côtes de Thoune – Shop-Layer (Home-Seiten + Bestellseite)   ------------------------------------------------------------   WOHIN: Dieser ganze Block kommt EINMAL in die projektweite   Fusszeilen-Code-Zone von Blocs (Window > Code Editor >   Footer/Projekt-Zone). Dann läuft er auf allen Seiten.   WAS ER MACHT:   - blendet auf getaggten Weinen den Hover-Knopf «In den Warenkorb» ein   - zeigt +/- direkt beim Wein, sobald er im Korb ist   - zeigt oben rechts ein schwebendes Warenkorb-Symbol mit Anzahl   - merkt den Korb über Seitenwechsel (Browser-Speicher)   - füllt auf der Bestellseite den bearbeitbaren Warenkorb +   schreibt die Bestellung ins Nachricht-Feld eures Formulars   DU PFLEGST NUR:   - die Preisliste unten (Namen/Preise)   - die Verfügbarkeit über eine Klasse pro Wein (siehe Anleitung):   shop-<id>   = erhältlich (klickbarer Knopf + Mengen +/-)   soldout-<id>  = «Ausverkauft» (nicht klickbar)   soon-<id>   = «Bald erhältlich» (nicht klickbar)   off-<id>  = nichts erscheint   Sprache der Labels wird automatisch gewählt.   ============================================================ --><style>.cdt-wine{position:relative;}.cdt-overlay{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:20;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}.cdt-overlay > *{pointer-events:auto;}.cdt-btn{opacity:0;transition:opacity .18s;cursor:pointer;border:none;background:#C4A86B;color:#232423;font-family:"Oswald",sans-serif;font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:14px;padding:11px 16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.18);}.cdt-wine:hover .cdt-btn{opacity:1;}.cdt-btn:hover{background:#917538;color:#fff;}.cdt-stepper{display:flex;align-items:center;gap:10px;background:#fff;border-radius:10px;padding:6px 8px;box-shadow:0 2px 10px rgba(0,0,0,.2);}.cdt-stepper button{cursor:pointer;border:1px solid #C4A86B;background:transparent;color:#232423;width:34px;height:34px;font-size:18px;line-height:1;border-radius:7px;}.cdt-stepper button:hover{background:#C4A86B;}.cdt-stepper span{font-family:"Oswald",sans-serif;font-weight:600;min-width:22px;text-align:center;}.cdt-badge{opacity:0;transition:opacity .18s;background:rgba(35,36,35,.85);color:#fff;font-family:"Oswald",sans-serif;font-size:13px;letter-spacing:.5px;text-transform:uppercase;padding:9px 15px;border-radius:8px;}.cdt-wine:hover .cdt-badge{opacity:1;}#cdt-fab{position:fixed;top:18px;right:18px;z-index:9999;display:none;align-items:center;gap:9px;background:#232423;color:#fff;border:none;cursor:pointer;padding:11px 15px;border-radius:30px;box-shadow:0 3px 12px rgba(0,0,0,.28);font-family:"Oswald",sans-serif;font-size:15px;text-decoration:none;}#cdt-fab svg{width:20px;height:20px;fill:#fff;}#cdt-fab .cdt-count{background:#C4A86B;color:#232423;border-radius:50%;min-width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;padding:0 5px;}#cdt-order{max-width:640px;margin:0 auto;font-family:inherit;color:#232423;}#cdt-order .cdt-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #D8D0BE;}#cdt-order .cdt-nm{flex:1;}#cdt-order .cdt-modus{display:flex;gap:18px;margin:16px 0;flex-wrap:wrap;}#cdt-order .cdt-modus label{display:flex;align-items:center;gap:6px;cursor:pointer;}#cdt-order .cdt-tot{display:flex;justify-content:space-between;font-size:20px;font-weight:600;font-family:"Oswald",sans-serif;margin-top:14px;}#cdt-order .cdt-age{display:flex;gap:8px;margin-top:16px;font-size:13px;color:#8A8175;cursor:pointer;line-height:1.5;}#cdt-order .cdt-empty{text-align:center;color:#8A8175;padding:24px 0;}</style><script>(function(){  /* ===================== HIER ANPASSEN ====================== */  var PRODUKTE = {  marsanne: { name: "Marsanne Roussanne Orange", preis: 22.00 },  viognier: { name: "Viognier Orange",  preis: 26.00 },  pinot:  { name: "Pinot Noir – Thunersee AOC",  preis: 28.00 },  lb25:   { name: "LB 25 – Regent / Pinot Noir", preis: 24.00 }  };  var VERSANDKOSTEN = 12.00; // Versandpauschale CH (0 = kein Versand)  var GRATIS_AB   = 150.00;  // gratis Versand ab diesem Warenwert (99999 = aus)  var BESTELL_URL = "/checkout/"; // Adresse eurer Bestellseite  /* ========================================================== */  var LABELS = {  de:{add:"In den Warenkorb",soldout:"Ausverkauft",soon:"Bald erhältlich",cart:"Warenkorb",empty:"Dein Warenkorb ist leer.",sub:"Zwischensumme",ship:"Versand",pickup:"Abholung in Gunten (gratis)",delivery:"Versand",total:"Total",age:"Ich bestätige, dass ich mind. 16 Jahre alt bin.",free:"gratis"},  fr:{add:"Ajouter au panier",soldout:"Épuisé",soon:"Bientôt disponible",cart:"Panier",empty:"Votre panier est vide.",sub:"Sous-total",ship:"Livraison",pickup:"Retrait à Gunten (gratuit)",delivery:"Livraison",total:"Total",age:"Je confirme avoir au moins 16 ans.",free:"gratuit"},  en:{add:"Add to cart",soldout:"Sold out",soon:"Coming soon",cart:"Cart",empty:"Your cart is empty.",sub:"Subtotal",ship:"Shipping",pickup:"Pickup in Gunten (free)",delivery:"Shipping",total:"Total",age:"I confirm I am at least 16 years old.",free:"free"}  };  var path=(location.pathname||"").toLowerCase();  var lang = path.indexOf("_fr")>-1 ? "fr" : path.indexOf("_en")>-1 ? "en" : "de";  var L = LABELS[lang] || LABELS.de;  var KEY="cdt_cart";  function load(){ try{return JSON.parse(localStorage.getItem(KEY))||{};}catch(e){return {};} }  function save(c){ try{localStorage.setItem(KEY,JSON.stringify(c));}catch(e){} }  var cart=load();  var ageState=false;  function chf(n){ return "CHF "+n.toFixed(2); }  function count(){ var n=0; for(var k in cart) n+=cart[k]; return n; }  function setQty(id,q){ if(q<=0) delete cart[id]; else cart[id]=q; save(cart); refreshAll(); }  /* ---- Weine auf der Seite ---- */  function parseWine(el){  for(var i=0;i<el.classList.length;i++){  var m=el.classList[i].match(/^(shop|soldout|soon|off)-(.+)$/);  if(m) return {state:m[1], id:m[2], el:el};  }  return null;  }  function findWines(){  var out=[];  document.querySelectorAll('[class*="shop-"],[class*="soldout-"],[class*="soon-"],[class*="off-"]').forEach(function(el){  var w=parseWine(el); if(w) out.push(w);  });  return out;  }  function renderWine(w){  w.el.classList.add("cdt-wine");  var ov=w.el.querySelector(":scope > .cdt-overlay");  if(w.state==="off" || (w.state==="shop" && !PRODUKTE[w.id])){ if(ov) ov.remove(); return; }  if(!ov){ ov=document.createElement("div"); ov.className="cdt-overlay"; w.el.appendChild(ov); }  ov.innerHTML="";  if(w.state==="soldout" || w.state==="soon"){  var badge=document.createElement("div"); badge.className="cdt-badge";  badge.textContent = w.state==="soldout" ? L.soldout : L.soon;  ov.appendChild(badge); return;  }  var q=cart[w.id]||0;  if(q<=0){  var b=document.createElement("button"); b.type="button"; b.className="cdt-btn";  b.textContent=L.add; b.onclick=function(){ setQty(w.id,1); };  ov.appendChild(b);  } else {  var s=document.createElement("div"); s.className="cdt-stepper";  var mi=document.createElement("button"); mi.type="button"; mi.textContent="−"; mi.onclick=function(){ setQty(w.id,(cart[w.id]||0)-1); };  var sp=document.createElement("span"); sp.textContent=q;  var pl=document.createElement("button"); pl.type="button"; pl.textContent="+"; pl.onclick=function(){ setQty(w.id,(cart[w.id]||0)+1); };  s.appendChild(mi); s.appendChild(sp); s.appendChild(pl);  ov.appendChild(s);  }  }  function renderWines(){ findWines().forEach(renderWine); }  /* ---- Schwebendes Warenkorb-Symbol ---- */  function fab(){  var f=document.getElementById("cdt-fab");  if(!f){  f=document.createElement("a"); f.id="cdt-fab"; f.href=BESTELL_URL;  f.innerHTML='<svg viewBox="0 0 24 24"><path d="M7 18c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM7.2 14.6h9.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49L19.14 6H6.21l-.94-2H2v2h2l3.6 7.59-1.35 2.44C4.52 17.37 5.48 19 7 19h12v-2H7z"/></svg><span class="cdt-lbl"></span><span class="cdt-count"></span>';  document.body.appendChild(f);  }  f.querySelector(".cdt-lbl").textContent=L.cart;  var n=count();  f.querySelector(".cdt-count").textContent=n;  f.style.display = n>0 ? "flex" : "none";  }  /* ---- Bestellseite ---- */  function orderModus(){ var r=document.querySelector('input[name="cdt-modus"]:checked'); return r?r.value:"versand"; }  function berechnen(modus){  var sub=0,pos=[];  for(var id in cart){ if(PRODUKTE[id]){ var b=cart[id]*PRODUKTE[id].preis; sub+=b; pos.push({id:id,q:cart[id],b:b}); } }  var ship=0; if(modus==="versand" && sub>0 && sub<GRATIS_AB) ship=VERSANDKOSTEN;  return {pos:pos,sub:sub,ship:ship,total:sub+ship};  }  var MARKER="— Lieferadresse & Bemerkungen / Adresse / Address —";  function msgFeld(){ return document.querySelector('textarea[id^="message"]') || document.querySelector('form textarea'); }  function orderText(d){  var z=["BESTELLUNG – Côtes de Thoune",""];  d.pos.forEach(function(x){ z.push(x.q+"× "+PRODUKTE[x.id].name+" — "+chf(x.b)); });  z.push("");  z.push(L.sub+": "+chf(d.sub));  z.push("Lieferung: "+(orderModus()==="abholung"?L.pickup:L.delivery));  if(orderModus()==="versand") z.push(L.ship+": "+chf(d.ship));  z.push("TOTAL: "+chf(d.total));  z.push("Alter 16+ : "+(ageState?"ja":"nein"));  return z.join("\n");  }  function writeMsg(d){  var ta=msgFeld(); if(!ta) return;  var order=d.pos.length?orderText(d):"";  var cur=ta.value||""; var i=cur.indexOf(MARKER);  var user=i>=0?cur.slice(i+MARKER.length).replace(/^\n+/,""):"Strasse:\nPLZ / Ort:\nTelefon:";  ta.value=order+"\n\n"+MARKER+"\n"+user;  }  function renderOrder(){  var box=document.getElementById("cdt-order"); if(!box) return;  var modus=orderModus(); var d=berechnen(modus);  if(d.pos.length===0){ box.innerHTML='<div class="cdt-empty">'+L.empty+'</div>'; writeMsg(d); return; }  var h="";  d.pos.forEach(function(x){  h+='<div class="cdt-row"><span class="cdt-nm">'+PRODUKTE[x.id].name+'</span>' +'<div class="cdt-stepper"><button type="button" data-m="'+x.id+'">−</button><span>'+x.q+'</span><button type="button" data-p="'+x.id+'">+</button></div>' +'<span>'+chf(x.b)+'</span></div>';  });  h+='<div class="cdt-modus">'  +'<label><input type="radio" name="cdt-modus" value="versand"'+(modus==="versand"?" checked":"")+'> '+L.delivery+'</label>'  +'<label><input type="radio" name="cdt-modus" value="abholung"'+(modus==="abholung"?" checked":"")+'> '+L.pickup+'</label></div>';  if(modus==="versand") h+='<div class="cdt-row"><span class="cdt-nm">'+L.ship+'</span><span>'+(d.ship===0?L.free:chf(d.ship))+'</span></div>';  h+='<div class="cdt-tot"><span>'+L.total+'</span><span>'+chf(d.total)+'</span></div>';  h+='<label class="cdt-age"><input type="checkbox" id="cdt-age"'+(ageState?" checked":"")+'> '+L.age+'</label>';  box.innerHTML=h; writeMsg(d);  }  function refreshAll(){ renderWines(); fab(); renderOrder(); }  document.addEventListener("click",function(e){  var t=e.target;  if(t.dataset && t.dataset.m!=null) setQty(t.dataset.m,(cart[t.dataset.m]||0)-1);  else if(t.dataset && t.dataset.p!=null) setQty(t.dataset.p,(cart[t.dataset.p]||0)+1);  });  document.addEventListener("change",function(e){  if(e.target.name==="cdt-modus") renderOrder();  else if(e.target.id==="cdt-age"){ ageState=e.target.checked; writeMsg(berechnen(orderModus())); }  });  function initForm(){  var ta=msgFeld();  if(ta && ta.form && !ta.form._cdt){  ta.form._cdt=true;  ta.form.addEventListener("submit",function(e){ var d=berechnen(orderModus()); writeMsg(d); if(d.pos.length===0){ e.preventDefault(); e.stopPropagation(); alert(L.empty); return; } if(!ageState){ e.preventDefault(); e.stopPropagation(); alert(L.age); return; }  },true);  }  }  function init(){ refreshAll(); initForm(); }  if(document.readyState!=="loading") init();  else document.addEventListener("DOMContentLoaded",init);})();</script></body></html>
